name: preview
on:
  pull_request:
    branches: [main, codex/production-deploy-ready]
  push:
    branches: [codex/production-deploy-ready]
jobs:
  vercel-preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_hxhoCuOTVudxi86gRHOsAuJF
      VERCEL_PROJECT_ID: prj_82mOJriJZUJtLZVFEr6NKofdM5zn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci
      - name: Skip Vercel preview when token is not configured
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::notice::VERCEL_TOKEN is not configured for this repository or PR context. Skipping preview deployment."
      - name: Pull Vercel preview environment
        if: env.VERCEL_TOKEN != ''
        run: npx vercel@53.0.1 pull --yes --environment=preview --token="$VERCEL_TOKEN" --scope akuma424-projects
      - name: Build Vercel preview
        if: env.VERCEL_TOKEN != ''
        run: npx vercel@53.0.1 build --token="$VERCEL_TOKEN"
      - name: Deploy Vercel preview
        if: env.VERCEL_TOKEN != ''
        run: npx vercel@53.0.1 deploy --prebuilt --token="$VERCEL_TOKEN"
