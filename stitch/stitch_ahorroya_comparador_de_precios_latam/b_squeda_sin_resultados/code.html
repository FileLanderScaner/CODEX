<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-container": "#e29100",
                        "secondary-fixed": "#dde1ff",
                        "on-primary-container": "#00422b",
                        "secondary-fixed-dim": "#b8c4ff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d3daea",
                        "on-error": "#ffffff",
                        "surface-tint": "#006c49",
                        "surface-container": "#e7eefe",
                        "outline": "#6c7a71",
                        "on-primary-fixed": "#002113",
                        "on-background": "#151c27",
                        "inverse-on-surface": "#ebf1ff",
                        "primary-container": "#10b981",
                        "outline-variant": "#bbcabf",
                        "on-secondary-container": "#00217a",
                        "inverse-primary": "#4edea3",
                        "tertiary-fixed": "#ffddb8",
                        "surface-bright": "#f9f9ff",
                        "primary-fixed-dim": "#4edea3",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-fixed": "#6ffbbe",
                        "tertiary": "#855300",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#2a1700",
                        "on-tertiary-container": "#523200",
                        "on-secondary-fixed": "#001453",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dce2f3",
                        "on-secondary-fixed-variant": "#173bab",
                        "inverse-surface": "#2a313d",
                        "error-container": "#ffdad6",
                        "secondary": "#3755c3",
                        "on-tertiary-fixed-variant": "#653e00",
                        "secondary-container": "#708cfd",
                        "surface-container-high": "#e2e8f8",
                        "surface-variant": "#dce2f3",
                        "on-surface": "#151c27",
                        "on-error-container": "#93000a",
                        "primary": "#006c49",
                        "surface-container-low": "#f0f3ff",
                        "on-surface-variant": "#3c4a42"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-page": "20px",
                        "unit": "4px",
                        "stack-gap": "8px",
                        "gutter-card": "16px",
                        "padding-element": "12px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "display-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "price-display": ["Manrope"],
                        "title-sm": ["Manrope"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "fontWeight": "700"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "price-display": ["28px", {"lineHeight": "32px", "fontWeight": "800"}],
                        "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background">
<!-- TopAppBar Section -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-5 h-16 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-100 ease-in-out text-emerald-600">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold tracking-tight text-gray-900 text-lg">Search</h1>
</div>
<button class="active:scale-95 duration-100 ease-in-out text-emerald-600">
<span class="material-symbols-outlined">tune</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 mb-24 px-margin-page py-6">
<!-- Contextual Search Bar (Search State Visibility) -->
<div class="mb-gutter-card">
<div class="flex items-center bg-white rounded-xl shadow-sm border border-gray-100 p-padding-element gap-3">
<span class="material-symbols-outlined text-outline">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface" placeholder="Buscar productos..." type="text" value="Detergente biodegradable"/>
<button class="text-error">
<span class="material-symbols-outlined">cancel</span>
</button>
</div>
</div>
<!-- Empty State Container -->
<div class="flex flex-col items-center justify-center py-10">
<!-- Illustration Area -->
<div class="relative w-64 h-64 mb-8 flex items-center justify-center">
<!-- Decorative background elements -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-110"></div>
<!-- Main Illustration Image -->
<div class="relative z-10 w-full h-full rounded-2xl overflow-hidden shadow-lg border-4 border-white">
<img alt="Person searching" class="w-full h-full object-cover" data-alt="Modern 3D stylized character looking through a large magnifying glass at an empty shelf, bright studio lighting, soft shadows, vibrant colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBshLKRxZBdQWHZBqeWBIl5FXdRuAEgcvN2oXl0vuzXTH2Fxq7jLEllceFew62RNcCAjd2EzVoJjtZP1zTLX4ueeo7bbb6bmJCcqMRGxZaqQWbPaCbZHHGGOwAOUWRTMXIhOoBf45w_4m-ITWSjl7a7WcEOSBWigdf-YZX9eR61ouxIzo9Gi-pKIZlwT2XwGZ4S2SpW0WaGKjT2Qt1rgW-tPmcdNhvMOuRHU8Ggty2lcKOeDt8LXACO-ZhJKMf7cOt_LAPIjvvbEdc"/>
</div>
<!-- Floating Icon UI Element -->
<div class="absolute -bottom-4 -right-4 bg-primary-container text-white p-4 rounded-xl shadow-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">shopping_cart_off</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-stack-gap mb-10 max-w-[280px]">
<h2 class="font-headline-md text-headline-md text-on-background">Sin resultados</h2>
<p class="font-body-md text-body-md text-on-surface-variant">No encontramos productos que coincidan con tu búsqueda.</p>
</div>
<!-- CTA Action -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-label-bold text-label-bold py-4 rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">refresh</span>
                Intentar otra búsqueda
            </button>
</div>
<!-- Helpful Suggestions (Proactive UI Pattern) -->
<div class="mt-8">
<h3 class="font-title-sm text-title-sm mb-4 text-on-surface">Sugerencias para ti</h3>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex flex-col gap-2 active:bg-gray-50 transition-colors">
<div class="w-10 h-10 bg-secondary/10 rounded-lg flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">trending_up</span>
</div>
<span class="font-label-bold text-label-bold">Ofertas del día</span>
</div>
<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex flex-col gap-2 active:bg-gray-50 transition-colors">
<div class="w-10 h-10 bg-tertiary/10 rounded-lg flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">history</span>
</div>
<span class="font-label-bold text-label-bold">Búsquedas recientes</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Section -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] rounded-t-lg">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-gray-400 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Home</span>
</a>
<!-- Search (Active State) -->
<a class="flex flex-col items-center justify-center bg-emerald-50 text-emerald-700 rounded-lg py-1.5 px-4 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Search</span>
</a>
<!-- Savings -->
<a class="flex flex-col items-center justify-center text-gray-400 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined">local_offer</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Savings</span>
</a>
<!-- Account -->
<a class="flex flex-col items-center justify-center text-gray-400 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Account</span>
</a>
</nav>
</body></html>
