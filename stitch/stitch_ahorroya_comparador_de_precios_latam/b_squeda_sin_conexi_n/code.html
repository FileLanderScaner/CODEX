<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "on-primary-fixed-variant": "#005236",
                        "tertiary-container": "#e29100",
                        "secondary-fixed": "#dde1ff",
                        "on-primary-container": "#00422b",
                        "secondary-fixed-dim": "#b8c4ff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d3daea",
                        "on-error": "#ffffff",
                        "surface-tint": "#006c49",
                        "surface-container": "#e7eefe",
                        "outline": "#6c7a71",
                        "on-primary-fixed": "#002113",
                        "on-background": "#151c27",
                        "inverse-on-surface": "#ebf1ff",
                        "primary-container": "#10b981",
                        "outline-variant": "#bbcabf",
                        "on-secondary-container": "#00217a",
                        "inverse-primary": "#4edea3",
                        "tertiary-fixed": "#ffddb8",
                        "surface-bright": "#f9f9ff",
                        "primary-fixed-dim": "#4edea3",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-fixed": "#6ffbbe",
                        "tertiary": "#855300",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#2a1700",
                        "on-tertiary-container": "#523200",
                        "on-secondary-fixed": "#001453",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dce2f3",
                        "on-secondary-fixed-variant": "#173bab",
                        "inverse-surface": "#2a313d",
                        "error-container": "#ffdad6",
                        "secondary": "#3755c3",
                        "on-tertiary-fixed-variant": "#653e00",
                        "secondary-container": "#708cfd",
                        "surface-container-high": "#e2e8f8",
                        "surface-variant": "#dce2f3",
                        "on-surface": "#151c27",
                        "on-error-container": "#93000a",
                        "primary": "#006c49",
                        "surface-container-low": "#f0f3ff",
                        "on-surface-variant": "#3c4a42"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-page": "20px",
                        "unit": "4px",
                        "stack-gap": "8px",
                        "gutter-card": "16px",
                        "padding-element": "12px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "display-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "price-display": ["Manrope"],
                        "title-sm": ["Manrope"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "fontWeight": "700"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "price-display": ["28px", {"lineHeight": "32px", "fontWeight": "800"}],
                        "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f9f9ff;
            color: #151c27;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-internet-illustration {
            background: radial-gradient(circle at center, #e7eefe 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar from Shared Components JSON -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-5 h-16 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md shadow-sm border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-emerald-600 dark:text-emerald-500 active:scale-95 duration-100 ease-in-out" data-icon="arrow_back">arrow_back</button>
<h1 class="font-display-lg text-headline-md tracking-tight text-gray-900 dark:text-white">Search</h1>
</div>
<button class="material-symbols-outlined text-emerald-600 dark:text-emerald-500 active:scale-95 duration-100 ease-in-out" data-icon="tune">tune</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-page pt-20 pb-24">
<!-- Search Bar Section (Standard pattern) -->
<div class="w-full max-w-md mb-gutter-card opacity-50 grayscale">
<div class="relative flex items-center bg-surface-container-low rounded-xl px-padding-element py-3 border border-outline-variant">
<span class="material-symbols-outlined mr-2 text-on-surface-variant" data-icon="search">search</span>
<span class="font-body-md text-on-surface-variant">Buscar productos...</span>
</div>
</div>
<!-- Error State Container -->
<div class="flex flex-col items-center text-center max-w-xs">
<!-- Icon/Illustration -->
<div class="relative mb-8 w-48 h-48 flex items-center justify-center no-internet-illustration rounded-full">
<div class="absolute inset-0 border-2 border-dashed border-outline-variant rounded-full opacity-20"></div>
<div class="z-10 bg-white shadow-xl p-6 rounded-3xl flex items-center justify-center border border-surface-container">
<span class="material-symbols-outlined text-error" data-icon="wifi_off" style="font-size: 64px; font-variation-settings: 'wght' 200;">wifi_off</span>
</div>
<!-- Small status circles -->
<div class="absolute top-4 right-4 w-4 h-4 bg-error rounded-full shadow-lg"></div>
<div class="absolute bottom-8 left-0 w-3 h-3 bg-outline-variant rounded-full opacity-50"></div>
</div>
<!-- Text Content -->
<h2 class="font-headline-md text-headline-md text-on-background mb-unit">¡Oh no!</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-gutter-card">Parece que no tienes conexión a internet.</p>
<!-- CTA Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-bold text-title-sm py-4 rounded-xl shadow-lg active:scale-95 transition-all duration-100 ease-in-out flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                Reintentar
            </button>
<!-- Subtle secondary option -->
<button class="mt-stack-gap font-label-bold text-primary text-body-sm py-2 px-4 hover:bg-surface-container rounded-lg transition-colors">
                Ver mis guardados (offline)
            </button>
</div>
</main>
<!-- BottomNavBar from Shared Components JSON -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-white dark:bg-gray-950 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] border-t border-gray-200 dark:border-gray-800 rounded-t-lg">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-display-lg text-[11px] font-semibold uppercase tracking-wider">Home</span>
</a>
<!-- Search (Active for this state based on context) -->
<a class="flex flex-col items-center justify-center bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 rounded-lg py-1.5 px-4 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="search" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-display-lg text-[11px] font-semibold uppercase tracking-wider">Search</span>
</a>
<!-- Savings -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="local_offer">local_offer</span>
<span class="font-display-lg text-[11px] font-semibold uppercase tracking-wider">Savings</span>
</a>
<!-- Account -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 py-1.5 px-4 hover:text-emerald-500 active:translate-y-0.5 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-display-lg text-[11px] font-semibold uppercase tracking-wider">Account</span>
</a>
</nav>
</body></html>
