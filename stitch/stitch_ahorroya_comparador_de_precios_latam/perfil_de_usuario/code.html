        }

<button class="active:scale-95 duration-100 p-2 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors rounded-full">
<span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400">menu</span>
</button>
<h1 class="text-2xl font-black text-emerald-600 dark:text-emerald-400 tracking-tighter">AhorroYA</h1>
</div>
<div class="active:scale-95 duration-100 h-10 w-10 rounded-full overflow-hidden border-2 border-emerald-500">

<main class="pt-24 pb-32 px-5 max-w-lg mx-auto">

<div class="flex flex-col items-center text-center">

</div>
</div>

<div class="mt-1 flex items-center gap-2 px-3 py-1 bg-tertiary-container/20 rounded-full">

<span class="font-label-bold text-label-bold text-tertiary">Plan Premium</span>

</div>

<p class="font-label-bold text-label-bold opacity-80 uppercase tracking-widest">Ahorro Total</p>
<h3 class="font-price-display text-price-display mt-1">$12,400</h3>
<div class="mt-3 flex items-center gap-1.5 text-emerald-100 text-sm">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span>+15% este mes</span>
</div>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-9xl">savings</span>
</div>
</div>
<div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-100">
<span class="material-symbols-outlined text-secondary mb-2">favorite</span>
<p class="font-label-bold text-label-bold text-zinc-500">Favoritos</p>
<p class="font-title-sm text-title-sm">24 items</p>

<div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-100">

<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-red-50 text-red-500">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>

</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-zinc-500">chevron_right</span>
</button>
<!-- Historial de Búsquedas -->

<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-zinc-100 text-zinc-600">
<span class="material-symbols-outlined">history</span>
</div>

</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-zinc-500">chevron_right</span>
</button>

</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-zinc-500">chevron_right</span>

</div>

<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-zinc-100 text-zinc-600">
<span class="material-symbols-outlined">settings</span>
</div>
<span class="font-title-sm text-on-surface">Configuración</span>
</div>
<span class="material-symbols-outlined text-zinc-300 group-hover:text-zinc-500">chevron_right</span>
</button>
